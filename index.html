<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox - Alpha v0.32</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #mining-ui { display: none; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 8px; background: rgba(0,0,0,0.6); border: 2px solid #222; border-radius: 4px; overflow: hidden; pointer-events: none; }
        #mining-progress { width: 0%; height: 100%; background: #4CAF50; transition: width 0.1s linear; }

        #time-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 10px; background: rgba(0,0,0,0.5); border: 2px solid #222; border-radius: 10px; z-index: 10; }
        #time-indicator { position: absolute; top: -12px; left: 0%; transform: translateX(-50%); font-size: 24px; text-shadow: 0 0 10px #000; transition: left 0.1s linear; }

        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; z-index: 10; }
        .slot { position: relative; width: 50px; height: 50px; border: 2px solid #555; background-color: rgba(255,255,255,0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); image-rendering: pixelated; }
        .slot.active { border-color: #FFD700; transform: scale(1.1); background-color: rgba(255, 215, 0, 0.2); }
        .slot canvas { width: 100%; height: 100%; object-fit: cover; }
        .item-count { position: absolute; bottom: 2px; right: 4px; color: white; font-family: monospace; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 0 #000; pointer-events: none; }
        
        #inventory-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; background: rgba(30, 30, 30, 0.95); border: 4px solid #555; border-radius: 10px; padding: 20px; z-index: 100; color: white; font-family: monospace; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .inv-layout { display: flex; gap: 20px; margin-top: 15px; }
        #preview-container { width: 150px; height: 250px; background: #222; border: 2px inset #000; display: flex; align-items: center; justify-content: center; overflow: hidden; pointer-events: none; }
        #preview-canvas { outline: none; }
        #inventory-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 60px); gap: 10px; }
        .inv-item { position: relative; border: 2px solid #555; background-color: rgba(255,255,255,0.05); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; }
        .inv-item:hover { background-color: rgba(255,255,255,0.2); }
        #dragged-item { position: absolute; pointer-events: none; z-index: 9999; display: none; width: 50px; height: 50px; filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.5)); }

        /* ✨ NEW: Item Name Tooltip */
        #item-tooltip { display: none; position: absolute; background: rgba(0,0,0,0.9); color: #FFD700; padding: 5px 10px; border: 2px solid #555; border-radius: 4px; font-family: monospace; font-weight: bold; font-size: 16px; z-index: 10000; pointer-events: none; text-transform: uppercase; text-shadow: 1px 1px 0 #000; }

        #pause-menu { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; flex-direction: column; align-items: center; justify-content: center; font-family: monospace; color: white; }
        #pause-menu h1 { font-size: 48px; text-shadow: 4px 4px 0 #000; margin-bottom: 40px; }
        .menu-btn { width: 250px; padding: 15px; margin: 10px; font-size: 20px; font-family: monospace; font-weight: bold; background: #555; color: white; border: 4px solid #000; cursor: pointer; transition: 0.1s; }
        .menu-btn:hover { background: #4CAF50; border-color: #fff; transform: scale(1.05); }
        #save-notif { color: #FFD700; margin-top: 20px; font-size: 18px; display: none; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="mining-ui"><div id="mining-progress"></div></div>
    <div id="dragged-item"></div>
    <!-- The new Tooltip -->
    <div id="item-tooltip">ITEM NAME</div>

    <div id="time-ui"><div id="time-indicator">☀️</div></div>
    
    <div id="hotbar">
        <div class="slot active" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
        <div class="slot" id="slot-3"></div>
        <div class="slot" id="slot-4"></div>
        <div class="slot" id="slot-5"></div>
    </div>

    <div id="inventory-screen">
        <h2 style="margin: 0; text-align: center;">Inventory / Character</h2>
        <div class="inv-layout">
            <div id="preview-container"><canvas id="preview-canvas" width="150" height="250"></canvas></div>
            <div id="inventory-grid"></div>
        </div>
    </div>

    <div id="pause-menu">
        <h1>Game Paused</h1>
        <button class="menu-btn" id="btn-resume">Back to Game</button>
        <button class="menu-btn" id="btn-save">Save Progress</button>
        <button class="menu-btn" id="btn-load">Load World</button>
        <div id="save-notif">Game Saved Successfully!</div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>
    <script type="module" src="./game/main.js"></script>
</body>
</html>
